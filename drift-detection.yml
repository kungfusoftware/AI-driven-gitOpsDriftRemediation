name: AI Drift Detection & Remediation

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger
    inputs:
      dry_run:
        description: "Dry run (detect only, no PR)"
        required: false
        default: "false"

permissions:
  contents: write
  pull-requests: write
  id-token: write          # Required for OIDC Azure login

env:
  TF_VERSION: "1.7.5"
  PYTHON_VERSION: "3.11"
  WORKING_DIR: "./terraform/staging"
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Detect Drift
  # ──────────────────────────────────────────────
  detect-drift:
    name: "1 · Detect Infrastructure Drift"
    runs-on: ubuntu-latest
    outputs:
      drift_detected: ${{ steps.check_drift.outputs.drift_detected }}
      plan_summary:   ${{ steps.check_drift.outputs.plan_summary }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.ARM_CLIENT_ID }}
          tenant-id:       ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=staging.terraform.tfstate"

      - name: Terraform Plan (Drift Detection)
        id: tf_plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -detailed-exitcode \
            -out=tfplan.binary \
            -var-file="staging.tfvars" \
            2>&1 | tee /tmp/plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Convert plan to JSON
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform show -json tfplan.binary > /tmp/tfplan.json
          echo "Plan JSON size: $(wc -c < /tmp/tfplan.json) bytes"

      - name: Check for drift
        id: check_drift
        run: |
          EXIT_CODE="${{ steps.tf_plan.outputs.exit_code }}"
          # 0 = no changes, 1 = error, 2 = changes present
          if [ "$EXIT_CODE" == "2" ]; then
            echo "drift_detected=true" >> $GITHUB_OUTPUT
            SUMMARY=$(python3 scripts/summarize_plan.py /tmp/tfplan.json)
            echo "plan_summary=${SUMMARY}" >> $GITHUB_OUTPUT
            echo "::warning::Infrastructure drift detected in Staging!"
          elif [ "$EXIT_CODE" == "0" ]; then
            echo "drift_detected=false" >> $GITHUB_OUTPUT
            echo "plan_summary=No drift detected" >> $GITHUB_OUTPUT
            echo "✅ No drift detected."
          else
            echo "drift_detected=error" >> $GITHUB_OUTPUT
            echo "::error::Terraform plan failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Upload plan artifacts
        if: steps.check_drift.outputs.drift_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            /tmp/tfplan.json
            /tmp/plan_output.txt
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 2: AI Remediation Agent
  # ──────────────────────────────────────────────
  ai-remediation:
    name: "2 · AI Remediation Agent"
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.drift_detected == 'true' && github.event.inputs.dry_run != 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: /tmp/

      - name: Run AI Remediation Agent
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT:  ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
          TF_WORKING_DIR:           ${{ env.WORKING_DIR }}
        run: |
          python scripts/ai_remediate.py \
            --plan-json /tmp/tfplan.json \
            --plan-text /tmp/plan_output.txt \
            --working-dir "${{ env.WORKING_DIR }}"

      - name: Post drift summary to job summary
        if: always()
        run: |
          echo "## 🤖 AI Drift Remediation Summary" >> $GITHUB_STEP_SUMMARY
          cat /tmp/remediation_summary.md >> $GITHUB_STEP_SUMMARY || echo "No summary generated." >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────
  # JOB 3: Notify on No Drift
  # ──────────────────────────────────────────────
  notify-clean:
    name: "3 · Notify Clean State"
    runs-on: ubuntu-latest
    needs: detect-drift
    if: needs.detect-drift.outputs.drift_detected == 'false'

    steps:
      - name: Post clean status
        run: |
          echo "## ✅ No Infrastructure Drift Detected" >> $GITHUB_STEP_SUMMARY
          echo "Staging environment matches Terraform state. No action required." >> $GITHUB_STEP_SUMMARY
          echo "**Checked at:** $(date -u)" >> $GITHUB_STEP_SUMMARY
